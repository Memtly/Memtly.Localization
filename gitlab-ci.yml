stages:
  - build
  - pack
  - publish

variables:
  PACKAGE_NAME: "WeddingShare.Translations"
  PACKAGE_VERSION: "1.0.${CI_PIPELINE_IID}"
  NUGET_PACKAGE_PATH: "bin/Release/*.nupkg"

build:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:9.0
  script:
    - dotnet restore
    - dotnet build -c Release --no-restore
  artifacts:
    paths:
      - bin/
      - obj/
    expire_in: 1 hour

pack:prerelease:
  stage: pack
  image: mcr.microsoft.com/dotnet/sdk:9.0
  dependencies:
    - build
  script:
    - dotnet pack -c Release --no-build -p:PackageVersion=$PACKAGE_VERSION-pre -p:PackageId=$PACKAGE_NAME-prerel -o ./nupkgs
  artifacts:
    paths:
      - nupkgs/*.nupkg
    expire_in: 1 week
  except:
    - main
    - master
    - tags

pack:stable:
  stage: pack
  image: mcr.microsoft.com/dotnet/sdk:9.0
  dependencies:
    - build
  script:
    - dotnet pack -c Release --no-build -p:PackageVersion=$PACKAGE_VERSION -p:PackageId=$PACKAGE_NAME -o ./nupkgs
  artifacts:
    paths:
      - nupkgs/*.nupkg
    expire_in: 1 week
  only:
    - main
    - master
    - tags

publish:
  stage: publish
  image: mcr.microsoft.com/dotnet/sdk:9.0
  script:
    - dotnet nuget add source "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/nuget/index.json" --name gitlab --username gitlab-ci-token --password $CI_JOB_TOKEN --store-password-in-clear-text
    - dotnet nuget push "nupkgs/*.nupkg" --source gitlab
  artifacts:
    paths:
      - nupkgs/*.nupkg
    expire_in: 1 week