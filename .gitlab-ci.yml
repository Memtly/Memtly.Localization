stages:
  - build
  - test
  - pack
  - publish

variables:
  DOTNET_VERSION: "9.0"
  NUGET_OUTPUT: "./nupkgs"

build:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:9.0
  script:
    - dotnet restore
    - dotnet build --configuration Release --no-restore

test:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:9.0
  script:
    - dotnet test --configuration Release --no-build

pack:
  stage: pack
  image: mcr.microsoft.com/dotnet/sdk:9.0
  script:
    - dotnet pack --configuration Release --output $NUGET_OUTPUT /p:Version=$CI_COMMIT_TAG
  artifacts:
    paths:
      - $NUGET_OUTPUT/*.nupkg
  rules:
    - if: $CI_COMMIT_TAG

publish:
  stage: publish
  image: mcr.microsoft.com/dotnet/sdk:9.0
  script:
    - dotnet nuget push $NUGET_OUTPUT/*.nupkg
        --source "$CI_SERVER_URL/api/v4/projects/$CI_PROJECT_ID/packages/nuget/index.json"
        --api-key $CI_JOB_TOKEN
    - dotnet nuget push $NUGET_OUTPUT/*.nupkg
        --source "https://api.nuget.org/v3/index.json"
        --api-key $NUGET_API_KEY
  rules:
    - if: $CI_COMMIT_TAG

create_github_release:
  stage: publish
  image: alpine:latest
  only:
    - tags
  script:
    - apk add --no-cache curl jq git
    - git fetch --tags
    - git tag -l --format='%(contents)' "$CI_COMMIT_TAG" > /tmp/tag_message.txt
    - |
      PREVIOUS_TAG=$(curl -s --header "Authorization: Bearer $GITHUB_RELEASE_TOKEN" "https://api.github.com/repos/$CI_PROJECT_PATH/releases/latest" | jq -r '.tag_name')
      if [ -n "$PREVIOUS_TAG" ] && [ "$PREVIOUS_TAG" != "null" ]; then
        echo "" >> /tmp/tag_message.txt
        printf '\n---\n\n***Changelog*** - %s' "https://github.com/${CI_PROJECT_PATH}/compare/${PREVIOUS_TAG}...${CI_COMMIT_TAG}" >> /tmp/tag_message.txt
        #git log "${PREVIOUS_TAG}...${CI_COMMIT_TAG}" --pretty=format:"- %s" >> /tmp/tag_message.txt
      fi
    - |
      curl --request POST \
        --header "Authorization: Bearer $GITHUB_RELEASE_TOKEN" \
        --header "Content-Type: application/json" \
        --data "$(jq -n \
          --arg tag "$CI_COMMIT_TAG" \
          --rawfile body /tmp/tag_message.txt \
          '{tag_name: $tag, name: $tag, body: $body}')" \
        "https://api.github.com/repos/$CI_PROJECT_PATH/releases"
  needs:
    - publish