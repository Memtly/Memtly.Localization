stages:
  - pack
  - publish

variables:
  PACKAGE_NAME: "WeddingShare.Lang"
  PACKAGE_VERSION: "1.${CI_PIPELINE_IID}.0"

# ==================== PACK ====================

pack:prerelease:
  stage: pack
  image: mcr.microsoft.com/dotnet/sdk:9.0
  script:
    - dotnet restore
    - dotnet build -c Release --no-restore
    - dotnet pack -c Release --no-build -p:PackageVersion=$PACKAGE_VERSION-pre -p:PackageId=$PACKAGE_NAME-prerel -o ./nupkgs
  artifacts:
    paths:
      - nupkgs/*.nupkg
    expire_in: 1 hour
  except:
    - main
    - master
    - tags

pack:stable:
  stage: pack
  image: mcr.microsoft.com/dotnet/sdk:9.0
  script:
    - dotnet restore
    - dotnet build -c Release --no-restore
    - dotnet pack -c Release --no-build -p:PackageVersion=$PACKAGE_VERSION -p:PackageId=$PACKAGE_NAME -o ./nupkgs
  artifacts:
    paths:
      - nupkgs/*.nupkg
    expire_in: 1 hour
  only:
    - main
    - master
    - tags

# ==================== PUBLISH ====================

publish:
  stage: publish
  image: mcr.microsoft.com/dotnet/sdk:9.0
  script:
    - dotnet nuget add source "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/nuget/index.json" --name gitlab --username gitlab-ci-token --password $CI_JOB_TOKEN --store-password-in-clear-text
    - dotnet nuget push "nupkgs/*.nupkg" --source gitlab
    #- dotnet nuget push "nupkgs/*.nupkg" --api-key $NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate 
  artifacts:
    paths:
      - nupkgs/*.nupkg
    expire_in: 1 week