name: Pack and Publish NuGet
on:
  push:
    branches:
      - master
    tags:
      - '*.*.*'
      - '*.*.*.*'
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore
        run: dotnet restore
        env:
          NUGET_TOKEN: ${{ secrets.NUGET_READ_TOKEN }}
      - name: Build
        run: dotnet build --configuration Release --no-restore
      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal
      - name: Set Version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          else
            echo "VERSION=0.0.0-preview.${GITHUB_SHA::7}" >> $GITHUB_ENV
          fi
      - name: Pack
        run: dotnet pack --configuration Release --no-build --output ./nupkg -p:Version=${{ env.VERSION }}
      - name: Push to GitHub Packages
        run: dotnet nuget push ./nupkg/*.nupkg --source "https://nuget.pkg.github.com/memtly/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate